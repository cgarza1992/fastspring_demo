<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSpring Embedded Checkout Test - Store 3</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(to b, #0f172a, #0e1828);
            color: #fff;
        }
        h1 {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 8px;
            padding: 20px;
        }
        #checkout-frame {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FastSpring Embedded Checkout - Test Store 3</h1>
        <p>Loading embedded checkout in sandbox iframe below:</p>
        
        <!-- Iframe with sandbox attributes to allow top-level navigation -->
        <iframe 
            id="checkout-frame"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation allow-top-navigation-by-user-activation"
            srcdoc="<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
</head>
<body style='margin: 0; padding: 20px;'>
    <script
        id='fsc-api'
        src='https://sbl.onfastspring.com/sbl/1.0.6/fastspring-builder.min.js'
        type='text/javascript'
        data-storefront='fastspringpoc.test.onfastspring.com/embedded-store-3'>
    </script>
    <div id='fsc-embedded-checkout-container'></div>
</body>
</html>">
        </iframe>
    </div>
</body>
</html>
</html>
