<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSpring Embedded Checkout Test - Store 1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(to b, #0f172a, #0e1828);
            color: #fff;
        }
        h1 {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 8px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FastSpring Embedded Checkout - Test Store 1</h1>
        <p>Loading embedded checkout below:</p>
        
        <script>
            console.log('Test page loaded, about to load FastSpring SBL...');
        </script>
        
        <script
            id="fsc-api"
            src="https://sbl.onfastspring.com/sbl/1.0.6/fastspring-builder.min.js"
            data-storefront="fastspringpoc.test.onfastspring.com/embedded-store-1">
        </script>
        
        <script>
            console.log('SBL script tag added to page');
            setTimeout(() => {
                if (window.fastspring) {
                    console.log('FastSpring loaded successfully:', window.fastspring);
                } else {
                    console.warn('FastSpring did not load');
                }
            }, 2000);
        </script>
        
        <!-- FastSpring embedded checkout container -->
        <div id="fsc-embedded-checkout-container" style="min-height: 600px; border: 1px solid #06b6d4; padding: 20px; margin-top: 20px;">
            Checkout will appear here...
        </div>
    </div>
</body>
</html>
