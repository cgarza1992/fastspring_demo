<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSpring Embedded Store</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #0e1828);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Embedded Store</h1>
        
        <script
            id="fsc-api"
            src="https://sbl.onfastspring.com/sbl/1.0.6/fastspring-builder.min.js"
            type="text/javascript"
            data-storefront="fastspringpoc.test.onfastspring.com/embedded-store-1">
        </script>
        
        <div id="fsc-embedded-checkout-container">

        </div>

        <script>
            // Add product on load, otherwise the embedded checkout will not load
            window.addEventListener('load', function() {
                if (window.fastspring && window.fastspring.builder) {
                    fastspring.builder.reset();
                    fastspring.builder.add("devmetrics-pro");
                    console.log('Product added to cart');
                }
            });
        </script>
    </div>
</body>
</html>
