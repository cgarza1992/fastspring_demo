<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastSpring Embedded Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #0e1828);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            padding: 16px 0;
            margin-bottom: 40px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 30px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #06b6d4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 40px;
            margin-bottom: 12px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header p {
            font-size: 18px;
            color: #94a3b8;
        }

        #fsc-embedded-checkout-container {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 8px;
            padding: 30px;
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
        }

        footer {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(6, 182, 212, 0.2);
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }

        footer a {
            color: #06b6d4;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Header Navigation -->
    <header>
        <nav>
            <div class="logo">FastSpring</div>
            <div>
                <a href="/">Home</a>
                <a href="/store.html">Store</a>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="page-header">
            <h1>Embedded Store</h1>
            <p>FastSpring embedded checkout experience - test storefront</p>
        </div>

        <!-- FastSpring SBL Script -->
        <script
            id="fsc-api"
            src="https://sbl.onfastspring.com/sbl/1.0.6/fastspring-builder.min.js"
            type="text/javascript"
            data-storefront="fastspringpoc.test.onfastspring.com/embedded-store-1">
        </script>

        <!-- FastSpring Embedded Checkout Container -->
        <div id="fsc-embedded-checkout-container">
            Loading checkout...
        </div>

        <!-- Footer -->
        <footer>
            <p>Secure checkout powered by <a href="https://fastspring.com" target="_blank">FastSpring</a></p>
        </footer>
    </div>

    <script>
        console.log('[SBL] Page loaded');
        
        // Monitor when FastSpring loads
        setTimeout(() => {
            if (window.fastspring) {
                console.log('✅ FastSpring loaded successfully');
                console.log('Builder methods:', Object.keys(window.fastspring.builder || {}));
            } else {
                console.warn('❌ FastSpring did not load');
            }
        }, 2000);

        // Listen for errors
        window.addEventListener('error', (e) => {
            console.error('❌ Error:', e.message);
        });

        // Listen for FastSpring events
        document.addEventListener('fs:data', (e) => {
            console.log('📦 FastSpring event:', e.detail);
        });
    </script>
</body>
</html>
